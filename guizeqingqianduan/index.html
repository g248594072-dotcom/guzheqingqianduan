  # MVU「角色档案」单条结构（合并写入后须符合）

  - **键名**：\`CHR-\` + 三位十进制，如 \`CHR-001\`、\`CHR-002\`。

  ## 顶层字段（对象内键名须齐全）

  - **姓名**：字符串。
  - **状态**：\`出场中\` | \`暂时退场\`。
  - **角色简介**：一整段背景或简介（长文）；**勿**再使用已废弃的 **描写** 键。
  - **代表性发言**：\`Record<场景或语境标识, 具体台词字符串>\`。
  - **爱好**：\`Record<爱好标签名, { 等级: 0–10 整数, 喜欢的原因: 字符串 }>\`。
