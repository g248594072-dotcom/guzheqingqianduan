效果、用途","initNode":"根据设定添加主角初始携带物品。","deleteNode":"触发条件: ①物品数量归零 ②完全消耗 ③全部丢弃或摧毁 ④超过20条时删除品质最低且最不相关的","updateNode":"触发条件: ①数量变化 ②描述变化","insertNode":"触发条件: 获得背包中没有的新物品"},"content":[[null,"物品名称","类型","数量","品质","描述"]],"updateConfig":{"uiSentinel":-1,"contextDepth":-1,"updateFrequency":-1,"batchSize":-1,"skipFloors":-1},"exportConfig":{"enabled":false,"splitByRow":false,"entryName":"物品表","entryType":"constant","keywords":"","preventRecursion":true,"injectionTemplate":"","extraIndexEnabled":false,"extraIndexEntryName":"物品表-索引","extraIndexColumns":[],"extraIndexColumnModes":{},"extraIndexInjectionTemplate":"","entryPlacement":{"position":"at_depth_as_system","depth":2,"order":10000},"extraIndexPlacement":{"position":"at_depth_as_system","depth":2,"order":10010},"fixedEntryPlacement":{"position":"at_depth_as_system","depth":2,"order":99990},"fixedIndexPlacement":{"position":"at_depth_as_system","depth":2,"order":99991}},"orderNo":6},"sheet_v2_quests":{"uid":"sheet_v2_quests","name":"任务表","sourceData":{"note":"记录主角当前承接的所有任务。\\n\\n【准入规则】\\n录入(OR): [主线任务,支线任务,悬赏通缉,委托请求]\\n禁入: [单轮可完成动作,世界规则类信息,无明确目标的事项]\\n判断标准: 有明确完成目标 AND 需跨越2轮以上交互\\n\\n【字段说明】\\n类型: [主线,支线,日常]\\n优先级: [紧急,重要,普通]\\n目标: 一句话描述完成条件，≤50字\\n进度(%): 必须是百分比数值格式，范围[0%,100%]\\n格式: \\"{数字}%\\"，数字为0-100的整数\\n正确示例: \\"0%\\" | \\"50%\\"\\n错误示例: \\"已完成一半\\" | \\"接近完成\\" | \\"50\\" \\n禁止: 任何描述性文字、中文数字、不带百分号或格式错误的数值\\n状态(Enum Tag): 必须从以下四个固定值中选择一个，禁止使用百分比或其他格式\\n可选值: [进行中,已完成,已失败,已放弃]\\n正确示例: \\"进行中\\" | \\"已完成\\" | \\"已失败\\" | \\"已放弃\\"\\n错误示例: \\"25%\\" | \\"50%\\" | \\"进行中50%\\" | \\"一半\\" | 任何包含百分号的格式\\n重要: 状态(Enum Tag)列和进度(%)列是不同字段，状态(Enum Tag)列禁止填入百分比，百分比只能填入进度(%)列","initNode":"添加初始任务（如有）。","deleteNode":"触发条件: 每轮必须检查并执行以下清理流程。\\n流程1(归档清理): 检查所有[已完成/已失败/已放弃]的终态任务，仅保留最近结束的2条作为记录，其余终态任务必须全部删除。\\n流程2(容量控制): 完成流程1后，如果任务总数仍超过10条，则在[进行中]的任务中，按优先级[普通→重要→紧急]顺序，删除最旧的低优先级任务，直到总数≤10。","updateNode":"触发条件: ①进度(%)变化 ②状态(Enum Tag)变化","insertNode":"触发条件: 接受新任务"},"content":[[null,"名称","类型","优先级","目标","进度(%)","状态(Enum Tag)","来源","奖励"]],"updateConfig":{"uiSentinel":-1,"contextDepth":-1,"updateFrequency":-1,"batchSize":-1,"skipFloors":-1},"exportConfig":{"enabled":false,"splitByRow":false,"entryName":"任务表","entryType":"constant","keywords":"","preventRecursion":true,"injectionTemplate":"","extraIndexEnabled":false,"extraIndexEntryName":"任务表-索引","extraIndexColumns":[],"extraIndexColumnModes":{},"extraIndexInjectionTemplate":"","entryPlacement":{"position":"at_depth_as_system","depth":2,"order":10000},"extraIndexPlacement":{"position":"at_depth_as_system","depth":2,"order":10010},"fixedEntryPlacement":{"position":"at_depth_as_system","depth":2,"order":99990},"fixedIndexPlacement":{"position":"at_depth_as_system","depth":2,"order":99991}},"orderNo":7},"sheet_v2_character_core":{"uid":"sheet_v2_character_core","name":"角色核心","sourceData":{"note":"【对应变量】角色档案.<档案ID> 全量字段。身体部位、敏感点、服装槽位、饰品、性癖条目均在本表同一行的五个 JSON 列中维护，禁止再拆到其它 sheet。\\n\\n【表分工】本表为剧情向角色（女角、须跟踪的配角等），一人一行。玩家主角（{{user}}）禁止出现在本表；主角属性、状态、地点只在「主角信息」，随身物在「背包物品」。\\n\\n【单表约束】本模板顶层含：元信息、游戏时间、世界/区域/个人规则、主角信息、背包物品、任务表、纪要表、角色核心、游戏状态扩展。「每名角色一行」专指本「角色核心」表中的剧情角色行；玩家主角仅一行写在「主角信息」。\\n\\n【检查清单 · 登场】\\n1. 正文出现有戏份、有对话、高颜值或性格特殊的女性角色或须跟踪的配角时（不含玩家主角）：本回合必须 insertRow 一行并写满所有列；禁止空列；性格JSON、身份标签JSON 须合法；五个嵌套 JSON 列须为合法 JSON：身体部位与敏感点须覆盖必建部位；饰品无则饰品JSON 可用 {}；性癖条目JSON 至少含一条对象。\\n2. 档案ID 唯一，可与姓名相同。\\n\\n【检查清单 · 标量字段】\\n3. 状态：出场中 | 暂时退场；场景切换、进出干涉范围或时间大幅跳跃时更新。\\n4. 当前内心想法：高频短对话可更新；随游戏时间可向顺从/发情侧偏移。\\n5. 隐藏性癖：文本摘要；极端羞耻显露后：将内容并入性癖条目JSON（可见性改为明面），并清空或缩短本列。\\n6. 年龄/身高/体重：数字或可解析字符串；三围、体质特征：文本。\\n7. 好感度 ±(1~3)；发情值言语撩拨 +(5~15)，随时间发酵，发泄后可回落；性癖开发值 +(2~8)，达 100 时在性癖条目JSON 内新增或升级条目后本列归零。\\n8. 当前综合生理描述：发情值、敏感点、服装破损变化时汇总更新。\\n9. 级联：规则表、跨日结算须同步更新本行相关 JSON 与标量。\\n\\n【身体部位物理状态JSON】\\n对象，键=部位名，值={\\"外观描述\\":\\"\\",\\"当前状态\\":\\"\\"}。建档至少含：脸部、手部、乳房、乳头、小穴、脚部。仅客观物理，禁止主观情绪。服装剥夺/摩擦/规则干涉时更新对应键的当前状态。\\n\\n【敏感点开发JSON】\\n对象，键=部位名（建议与身体部位键对齐），值={\\"敏感等级\\":0,\\"生理反应\\":\\"\\",\\"开发细节\\":\\"\\"}。随视线、触碰、规则更新；与性癖开发值增长配合。\\n\\n【服装槽位JSON】\\n对象，固定键：上装、下装、内衣、足部。每键值={\\"名称\\":\\"\\",\\"状态\\":\\"\\",\\"描述\\":\\"\\"}。剥夺/破损只
